function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function selectRounds(){
  const byAI={};
  Q.forEach(q=>{if(!byAI[q.answer])byAI[q.answer]=[];byAI[q.answer].push(q)});
  Object.keys(byAI).forEach(k=>byAI[k]=shuffle(byAI[k]));
  const ais=shuffle(Object.keys(byAI));
  const sel=[];
  sel.push(...byAI[ais[0]].slice(0,2));
  sel.push(...byAI[ais[1]].slice(0,2));
  sel.push(byAI[ais[2]][0]);
  return shuffle(sel);
}

function parseLine(t){const p=t.split(/\*\*(.*?)\*\*/g);return p.map((s,i)=>i%2===1?React.createElement("strong",{key:i,style:{fontWeight:700}},s):React.createElement("span",{key:i},s))}

function RT({text,style}){
  return React.createElement("div",{style},text.split("\n").map((ln,i)=>{
    if(ln.trim()==="")return React.createElement("div",{key:i,style:{height:10}});
    if(ln.trim()==="---")return React.createElement("hr",{key:i,style:{border:"none",borderTop:"1px solid #ddd",margin:"8px 0"}});
    if(ln.trim().startsWith("* ")){const c=ln.trim().slice(2);return React.createElement("div",{key:i,style:{display:"flex",gap:8,paddingLeft:8,lineHeight:1.7}},React.createElement("span",{style:{color:"#a08850",flexShrink:0}},"•"),React.createElement("span",null,parseLine(c)))}
    return React.createElement("div",{key:i,style:{lineHeight:1.7}},parseLine(ln));
  }));
}

        </div>}
        <div style={{height:24}}/>
        <button onClick={next} style={{...btn,background:`linear-gradient(135deg,${gd},${gdd})`,color:bg,fontSize:16,letterSpacing:2,boxShadow:`0 4px 20px ${gd}33`}}>{idx<rounds.length-1?"次の一杯へ":"鑑定結果を見る"}</button>
      </div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
