function parseLine(text) {
  const parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map((part, i) =>
    i % 2 === 1
      ? React.createElement("strong", { key: i, style: { fontWeight: 700 } }, part)
      : React.createElement("span", { key: i }, part)
  );
}

function RenderText({ text, style }) {
  const lines = text.split("\n");
  return (
    <div style={style}>
      {lines.map((line, i) => {
        if (line.trim() === "") return <div key={i} style={{ height: 10 }} />;
        if (line.trim().startsWith("* ")) {
          const content = line.trim().slice(2);
          return (
            <div key={i} style={{ display: "flex", gap: 8, paddingLeft: 8, lineHeight: 1.7 }}>
              <span style={{ color: "#a08850", flexShrink: 0 }}>•</span>
              <span>{parseLine(content)}</span>
            </div>
          );
        }
        return <div key={i} style={{ lineHeight: 1.7 }}>{parseLine(line)}</div>;
      })}
    </div>
  );
}

function WineGlass({ size = 48, color = "#c9a24e" }) {

    </svg>
  );
}

function AITasting() {
  const [screen, setScreen] = useState("title");
  const [roundIdx, setRoundIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showNote, setShowNote] = useState(false);
  const [history, setHistory] = useState([]);
  const noteRef = useRef(null);

  const round = ROUNDS[roundIdx];
  const isCorrect = selected === round?.answer;

  useEffect(() => {
    if (showNote && noteRef.current) {
      noteRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }, [showNote]);

  const handleSelect = (choice) => {
    setSelected(choice);
    if (choice === round.answer) setScore((s) => s + 1);
    setHistory((h) => [...h, { round: roundIdx, choice, correct: choice === round.answer }]);
    setScreen("reveal");
    setTimeout(() => setShowNote(true), 700);

  const nextRound = () => {
    if (roundIdx < ROUNDS.length - 1) {
      setRoundIdx((r) => r + 1);
      setSelected(null);
      setShowNote(false);
      setScreen("playing");
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      setScreen("results");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

  const restart = () => {
    setScreen("title");
    setRoundIdx(0);
    setScore(0);
    setSelected(null);
    setShowNote(false);
    setHistory([]);

    <div style={containerStyle}>
      {/* Progress */}
      <div style={{ width: "100%", maxWidth: 520, display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
        <p style={{ fontSize: 12, color: mutedText, whiteSpace: "nowrap" }}>第{roundIdx + 1}杯 / 全{ROUNDS.length}杯</p>
        <div style={{ flex: 1, height: 3, background: `${lightText}20`, borderRadius: 2 }}>
          <div style={{
            width: `${((roundIdx + (isRevealed ? 1 : 0)) / ROUNDS.length) * 100}%`,
            height: "100%", background: gold, borderRadius: 2, transition: "width 0.5s ease",
          }} />
        </div>
        <p style={{ fontSize: 12, color: gold, fontWeight: 600 }}>{score}点</p>
      </div>
      <div style={{ height: 8 }} />

      {/* Prompt */}
      <div style={{
        width: "100%", maxWidth: 520, padding: "12px 16px", borderRadius: 8,
        background: `${wine}30`, border: `1px solid ${wine}60`, marginBottom: 16,
      }}>
        <p style={{ fontSize: 11, color: mutedText, marginBottom: 4, letterSpacing: 1 }}>お題</p>
        <p style={{ fontSize: 15, fontWeight: 600 }}>「{round.prompt}」</p>
      </div>

      {/* AI Response */}
      <div style={{ ...cardStyle, position: "relative" }}>
        <div style={{
          position: "absolute", top: 12, right: 16, fontSize: 11, color: "#bbb",
          background: "#f0ece4", padding: "2px 10px", borderRadius: 20,
        }}>AI の回答</div>
        <div style={{ height: 8 }} />
        <RenderText text={round.text} style={{ marginTop: 8 }} />
      </div>
      <div style={{ height: 20 }} />

      {/* Choices */}
      {!isRevealed && (
        <div style={{ width: "100%", maxWidth: 520 }}>
          <p style={{ fontSize: 12, color: mutedText, textAlign: "center", marginBottom: 14, letterSpacing: 2 }}>
            このAIは誰でしょう？
          </p>
          <div style={{ display: "flex", gap: 10 }}>
            {CHOICES.map((c) => (
              <button key={c} onClick={() => handleSelect(c)}
                style={{
                  ...btnBase, background: "transparent",
                  border: `1.5px solid ${CHOICE_COLORS[c].bg}88`,
                  color: CHOICE_COLORS[c].bg, fontSize: 14, padding: "14px 8px",
                }}
                onMouseEnter={(e) => { e.target.style.background = CHOICE_COLORS[c].bg; e.target.style.color = "#fff"; }}
                onMouseLeave={(e) => { e.target.style.background = "transparent"; e.target.style.color = CHOICE_COLORS[c].bg; }}
              >{c}</button>
            ))}
          </div>
        </div>
      )}

      {/* Reveal */}
      {isRevealed && (
        <div style={{ width: "100%", maxWidth: 520 }}>
          <div style={{ textAlign: "center", padding: "12px 0", animation: "fadeIn 0.4s ease" }}>
            <span style={{
              display: "inline-block", fontSize: 14, fontWeight: 700, padding: "6px 20px",
              borderRadius: 20,
              background: isCorrect ? "#1a4a2a" : "#4a1a1a",
              color: isCorrect ? "#6ecf8e" : "#e07070",
              border: `1px solid ${isCorrect ? "#6ecf8e44" : "#e0707044"}`,
            }}>
              {isCorrect ? "✓ お見事！" : `✗ 残念… 正解は ${round.answer}`}
            </span>
          </div>
          <div style={{ textAlign: "center", marginTop: 8, animation: "fadeIn 0.5s ease" }}>
            <span style={{
              display: "inline-block", background: CHOICE_COLORS[round.answer].bg,
              color: "#fff", padding: "6px 24px", borderRadius: 20,
              fontSize: 15, fontWeight: 700, letterSpacing: 1,
            }}>{round.answer}</span>
          </div>

          {showNote && (
            <div ref={noteRef} style={{
              marginTop: 20, background: "linear-gradient(135deg, #fdfaf3, #f6f0e0)",
              borderLeft: `3px solid ${gold}`, borderRadius: "0 10px 10px 0",
              padding: "20px 20px", color: darkText, animation: "slideUp 0.6s ease",
              boxShadow: "0 2px 16px rgba(0,0,0,0.15)",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <span style={{ fontSize: 20 }}>🍷</span>
                <span style={{ fontSize: 12, color: goldDark, fontWeight: 700, letterSpacing: 2 }}>
                  ソムリエのテイスティングノート
                </span>
              </div>
              <div style={{
                fontFamily: '"Hiragino Mincho ProN", "Noto Serif JP", "Times New Roman", serif',
                fontSize: 14, lineHeight: 2, fontStyle: "italic", color: "#3a2a1a",
              }}>
                {(isCorrect ? round.correctNote : round.wrongNote).split("\n").map((line, i) =>
                  line === "" ? <div key={i} style={{ height: 8 }} /> : <div key={i}>{line}</div>
                )}
              </div>
            </div>
          )}

          <div style={{ height: 24 }} />
          <button onClick={nextRound} style={{
            ...btnBase,
            background: `linear-gradient(135deg, ${gold}, ${goldDark})`,
            color: bg, fontSize: 16, letterSpacing: 2, boxShadow: `0 4px 20px ${gold}33`,
          }}>
            {roundIdx < ROUNDS.length - 1 ? "次の一杯へ" : "鑑定結果を見る"}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AITasting />);
</script>
</body>
</html>
